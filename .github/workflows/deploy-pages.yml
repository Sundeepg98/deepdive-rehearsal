name: Deploy to GitHub Pages (gated on THE GATE)

# Auto-redeploy the single-file trainer to the gh-pages branch, but ONLY when the
# full correctness gate (test/check_all.py) passes on master. This closes the gap
# that let the live site drift to an unverified snapshot: no green gate => no deploy.

on:
  push:
    branches: [master]
    # Doc-only pushes don't change the deliverable, so they must not redeploy.
    # paths-ignore skips the run only when EVERY changed file matches; a mixed
    # code+doc push still deploys.
    paths-ignore:
      - '_audit/**'
      - '**.md'
      - '.gitignore'
      - '.gitattributes'
  workflow_dispatch: {}

# GITHUB_TOKEN needs write access to push the built HTML to the gh-pages branch.
permissions:
  contents: write

# Never let two deploys race; let an in-flight deploy finish.
concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  gate-then-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      # check_all.py runs `node --check` (syntax_check) and locates Chromium via
      # Playwright. Node + Playwright must be present so the browser checks
      # (render / entity_leak / e2e_interactions) RUN here instead of skipping.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright + Chromium (so THE GATE runs its browser checks)
        run: |
          npm ci
          npx playwright install --with-deps chromium

      # THE GATE's build_integrity check already runs `npm run build` and asserts the
      # fresh output is byte-identical to the committed deliverable, so a green gate
      # means the committed file IS the verified artifact -- no separate build step.
      # (The old `python build.py` step was retired in the Vite migration, 97b746e.)
      - name: THE GATE -- hard gate, deploy only if this passes (browser checks included)
        run: python test/check_all.py

      - name: Assemble served paths (root index.html + named file, byte-identical)
        run: |
          rm -rf _site
          mkdir -p _site
          cp deepdive_content_pipeline_rehearsal.html _site/index.html
          cp deepdive_content_pipeline_rehearsal.html _site/deepdive_content_pipeline_rehearsal.html

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./_site
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy ${{ github.sha }} to gh-pages (gate-green)'
