[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = test
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Legacy standalone scripts - not pytest modular tests
addopts = -p no:anyio --ignore=test/e2e_comprehensive_test.py --ignore=test/e2e_production_test.py --ignore=test/e2e_full_test.py
markers =
    layout: desktop and mobile layout
    spa: SPA architecture
    router: hash router and navigation
    views: view transitions and lifecycle
    components: web component rendering
    console: JS errors and console
    content: content validation
    accessibility: keyboard, ARIA, AXE
    performance: load times, resource sizes
    visual: CSS validation, animations
    responsive: breakpoints and viewports
    slow: tests > 3 seconds
    critical: must always pass
    fast: tests < 1 second
