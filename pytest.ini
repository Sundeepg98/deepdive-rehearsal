[pytest]
testpaths = test
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = --ignore=test/e2e_comprehensive_test.py --ignore=test/e2e_production_test.py --ignore=test/e2e_full_test.py -v
markers =
    layout: desktop and mobile layout tests
    spa: SPA architecture tests
    router: hash router and navigation tests
    views: view transition and lifecycle tests
    components: web component rendering tests
    accessibility: AXE, keyboard, ARIA tests
    performance: Lighthouse and load time tests
    visual: CSS validation and visual effects
    slow: tests that take >5 seconds
    critical: must-pass tests
